steps:
  # ── Step 1: Build Docker image and push to Artifact Registry ──────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    args:
      - "build"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/lexguard/backend:$SHORT_SHA"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/lexguard/backend:latest"
      - "backend/"

  # ── Step 2: Push image to Artifact Registry ────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      - "push"
      - "--all-tags"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/lexguard/backend"

  # ── Step 3: Deploy to Cloud Run ────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-cloud-run"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "lexguard-backend"
      - "--image=us-central1-docker.pkg.dev/$PROJECT_ID/lexguard/backend:$SHORT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=2Gi"
      - "--cpu=1"
      - "--concurrency=80"
      - "--max-instances=10"
      - "--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID"

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/lexguard/backend:$SHORT_SHA"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/lexguard/backend:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

timeout: "1200s"
